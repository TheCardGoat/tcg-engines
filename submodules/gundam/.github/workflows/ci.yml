name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-type-check-format-lint-test:
    name: Build, Type Check, Format, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: |
          pnpm --filter @tcg/gundam-types run build
          pnpm --filter @tcg/gundam-token-data run build
          pnpm --filter @tcg/gundam-engine run build
          pnpm --filter @tcg/gundam-cards run build

      - name: Compile i18n messages
        working-directory: apps/simulator
        run: npx @inlang/paraglide-js compile --project ./project.inlang

      - name: Format check
        run: |
          pnpm vp fmt
          git diff --exit-code || (echo "Format issues detected. Run 'pnpm vp fmt' locally and commit the changes." && exit 1)

      - name: Lint
        run: pnpm vp lint

      - name: Harness invariants
        run: pnpm check:harness

      - name: Type check
        run: pnpm vp check

      - name: Test
        run: pnpm vp test

      - name: Build
        run: pnpm -r run build

      - name: Install Playwright browsers
        run: pnpm --filter @tcg/gundam-simulator exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm --filter @tcg/gundam-simulator test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/simulator/playwright-report/
          retention-days: 7
