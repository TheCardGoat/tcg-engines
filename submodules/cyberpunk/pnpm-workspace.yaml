packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@discord/embedded-app-sdk": ^2.5.0
  "@dnd-kit/core": ^6.3.1
  "@mantine/dropzone": ^9.0.0
  "@mantine/modals": ^9.0.0
  "@mantine/notifications": ^9.0.0
  "@mantine/spotlight": ^9.0.0
  "@playwright/test": ^1.59.1
  "@tabler/icons-react": ^3.41.1
  "@types/node": ^24
  better-auth: 1.6.9
  bun-types: ^1.3.13
  cheerio: ^1.2.0
  mutative: ^1.3.0
  socket.io-client: ^4.8.3
  socket.io-msgpack-parser: ^3.0.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.4.3

catalogMode: prefer
onlyBuiltDependencies:
  - esbuild
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
