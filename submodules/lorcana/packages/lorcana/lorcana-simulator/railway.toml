# Railway configuration for the Lorcana simulator (SvelteKit via adapter-node).

[build]
builder = "DOCKERFILE"
dockerfilePath = "submodules/lorcana/packages/lorcana/lorcana-simulator/Dockerfile"
watchPatterns = [
  "submodules/lorcana/packages/lorcana/lorcana-simulator/**",
  "package.json",
  "pnpm-lock.yaml",
  "turbo.json",
  "tsconfig.json",
  "submodules/lorcana/packages/**",
]

[deploy]
#healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

[deploy.teardown]
overlapSeconds = 60
drainingSeconds = 60

[environments.production.deploy]
numReplicas = 1
restartPolicyMaxRetries = 5

[environments.staging.deploy]
numReplicas = 1

[environments.pr.deploy]
numReplicas = 1
