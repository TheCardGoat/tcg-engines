<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- White version of TCG Monogram for dark/gold backgrounds -->
  <rect width="512" height="512" fill="none"/>
  
  <g transform="translate(256, 256) translate(-200, -200) scale(0.78)">
    <!-- T - Top bar and stem -->
    <path d="M50 80 L350 80 L350 140 L230 140 L230 400 L170 400 L170 140 L50 140 Z" fill="#ffffff"/>
    
    <!-- C - Curved/interwoven shape -->
    <path d="M100 140 L160 140 L160 340 L280 340 L280 400 L100 400 Q60 400 60 360 L60 180 Q60 140 100 140 Z" fill="#ffffff"/>
    <path d="M100 180 L140 180 L140 360 L100 360 Q80 360 80 340 L80 200 Q80 180 100 180 Z" fill="#1a1a1a"/>
    
    <!-- G - Triangle shape -->
    <path d="M300 80 L450 80 L375 280 Z" fill="#ffffff"/>
    <path d="M345 140 L405 140 L375 200 Z" fill="#1a1a1a"/>
  </g>
</svg>
