name: Gundam CI

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci-gundam.yml"
      - ".bun-version"
      - "package.json"
      - "submodules/gundam/**"
      - "submodules/agnostic-simulator/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=8192
  VP_RUN_CONCURRENCY_LIMIT: 4
  TURBO_RUN_SUMMARY: false

jobs:
  gundam:
    name: Gundam Project CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Install Gundam dependencies
        working-directory: submodules/gundam
        run: vp install --frozen-lockfile

      - name: Install agnostic simulator dependencies
        working-directory: submodules/agnostic-simulator
        run: vp install --frozen-lockfile

      - name: Run Gundam full CI
        working-directory: submodules/gundam
        run: pnpm run ci-check-full
